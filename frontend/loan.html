<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Loan | Smart Expense Tracker</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page" data-page="loan">

  <div class="background-shapes">
    <span class="shape shape-one"></span>
    <span class="shape shape-two"></span>
    <span class="shape shape-three"></span>
  </div>

  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-box small-logo">₹</div>
      <h2>SmartTrack</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html"><span>📊</span>Dashboard</a>
      <a href="income.html"><span>💰</span>Income</a>
      <a href="expense.html"><span>💳</span>Expense</a>
      <a href="loan.html" class="active"><span>🏦</span>Loan</a>
      <a href="borrow.html"><span>🤝</span>Borrow/Lend</a>
      <a href="subscription.html"><span>🔁</span>Subscription</a>
      <a href="ai-suggestions.html"><span>🤖</span>AI Suggestions</a>
    </nav>

    <div class="sidebar-bottom">
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

  </aside>

  <main class="dashboard-main">

    <header class="dashboard-topbar">
      <div class="topbar-left">
        

        <div>
          <h1>Loan</h1>
          <p>Track loans, EMI, remaining amount and repayments.</p>
        </div>
      </div>

    </header>

    <section class="dashboard-content">

      <div class="dashboard-panel">
        <div class="panel-header">
          <h2>Add Loan</h2>
        </div>

        <div class="panel-body">
          <form id="loanForm">

            <div class="form-grid">

              <div class="form-group">
                <label for="loan_name">Loan Name</label>
                <input
                  type="text"
                  id="loan_name"
                  class="form-input"
                  placeholder="Bike Loan / Education Loan"
                  required
                >
              </div>

              <div class="form-group">
                <label for="total_amount">Total Amount</label>
                <input
                  type="number"
                  id="total_amount"
                  class="form-input"
                  placeholder="50000"
                  required
                >
              </div>

              <div class="form-group">
                <label for="monthly_emi">Monthly EMI</label>
                <input
                  type="number"
                  id="monthly_emi"
                  class="form-input"
                  placeholder="5000"
                  required
                >
              </div>

              <div class="form-group">
                <label for="remaining_amount">Remaining Amount</label>
                <input
                  type="number"
                  id="remaining_amount"
                  class="form-input"
                  placeholder="50000"
                  required
                >
              </div>

              <div class="form-group">
                <label for="due_date">Due Date</label>
                <input
                  type="date"
                  id="due_date"
                  class="form-input"
                  required
                >
              </div>

            </div>

            <button type="submit" class="register-btn">
              Add Loan
            </button>

            <div id="loanMessage" class="message"></div>

          </form>
        </div>
      </div>

      <div class="dashboard-panel">
        <div class="panel-header">
          <h2>Loan Records</h2>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Loan Name</th>
                <th>Total Amount</th>
                <th>Monthly EMI</th>
                <th>Remaining</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="loanTable">
              <tr>
                <td colspan="8">Loading loan records...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
