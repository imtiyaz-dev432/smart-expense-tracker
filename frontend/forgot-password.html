<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password | Smart Expense Tracker</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page" data-page="forgot">

  <div class="background-shapes">
    <span class="shape shape-one"></span>
    <span class="shape shape-two"></span>
    <span class="shape shape-three"></span>
  </div>

  <main class="register-page">

    <section class="register-card">

      <div class="register-header">
        <div class="logo-box">🔑</div>

        <h1>Forgot Password</h1>

        <p>
          Enter the OTP sent to your registered email.
        </p>
      </div>

      <form id="forgotForm" class="register-form">

        <div class="form-group">
          <label for="identifier">Email or Mobile</label>

          <input
            type="text"
            id="identifier"
            class="form-input"
            placeholder="Enter email or mobile number"
            required
          >
        </div>

        <button type="submit" class="register-btn">
          Send Reset OTP
        </button>

        <div id="forgotMessage" class="message"></div>

      </form>

      <div class="register-footer">
        <p>
          Remember password?
          <a href="login.html">Back to Login</a>
        </p>
      </div>

    </section>

  </main>
  <button type="submit" class="register-btn">
  Send Reset OTP
</button>

  <script src="js/script.js"></script>
</body>
</html>
