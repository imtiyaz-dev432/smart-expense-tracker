<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reset Password | Smart Expense Tracker</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page" data-page="reset">

  <div class="background-shapes">
    <span class="shape shape-one"></span>
    <span class="shape shape-two"></span>
    <span class="shape shape-three"></span>
  </div>

  <main class="register-page">

    <section class="register-card">

      <div class="register-header">
        <div class="logo-box">🛡️</div>

        <h1>Reset Password</h1>

        <p>
          Enter OTP and create your new password.
        </p>
      </div>

      <form id="resetForm" class="register-form">

        <div class="form-group">
          <label for="identifier">Email or Mobile</label>

          <input
            type="text"
            id="identifier"
            class="form-input"
            placeholder="Enter email or mobile number"
            required
          >
        </div>

        <div class="form-group">
          <label for="otp">Reset OTP</label>

          <input
            type="text"
            id="otp"
            class="form-input"
            placeholder="Enter 6 digit OTP"
            maxlength="6"
            required
          >
        </div>

        <div class="form-group">
          <label for="new_password">New Password</label>

          <input
            type="password"
            id="new_password"
            class="form-input"
            placeholder="Create new password"
            required
          >
        </div>

        <button type="submit" class="register-btn">
          Reset Password
        </button>

        <div id="resetMessage" class="message"></div>

      </form>

      <div class="register-footer">
        <p>
          Back to
          <a href="login.html">Login?</a>
        </p>
      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
