<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Borrow/Lend | Smart Expense Tracker</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page" data-page="borrow">

  <div class="background-shapes">
    <span class="shape shape-one"></span>
    <span class="shape shape-two"></span>
    <span class="shape shape-three"></span>
  </div>

  <aside class="sidebar" id="sidebar">

    <div class="sidebar-logo">
      <div class="logo-box small-logo">₹</div>
      <h2>SmartTrack</h2>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html"><span>📊</span>Dashboard</a>
      <a href="income.html"><span>💰</span>Income</a>
      <a href="expense.html"><span>💳</span>Expense</a>
      <a href="loan.html"><span>🏦</span>Loan</a>
      <a href="borrow.html" class="active"><span>🤝</span>Borrow/Lend</a>
      <a href="subscription.html"><span>🔁</span>Subscription</a>
      <a href="ai-suggestions.html"><span>🤖</span>AI Suggestions</a>
    </nav>

    <div class="sidebar-bottom">
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

  </aside>

  <main class="dashboard-main">

    <header class="dashboard-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle">☰</button>

        <div>
          <h1>Borrow / Lend</h1>
          <p>Track borrowed and lent money with pending or paid status.</p>
        </div>
      </div>

      
    </header>

    <section class="dashboard-content">

      <div class="dashboard-panel">
        <div class="panel-header">
          <h2>Add Borrow / Lend</h2>
        </div>

        <div class="panel-body">
          <form id="borrowForm">

            <div class="form-grid">

              <div class="form-group">
                <label for="person_name">Person Name</label>
                <input
                  type="text"
                  id="person_name"
                  class="form-input"
                  placeholder="Aman / Rahul"
                  required
                >
              </div>

              <div class="form-group">
                <label for="amount">Amount</label>
                <input
                  type="number"
                  id="amount"
                  class="form-input"
                  placeholder="5000"
                  required
                >
              </div>

              <div class="form-group">
                <label for="type">Type</label>
                <select id="type" class="form-input" required>
                  <option value="">Select type</option>
                  <option value="borrowed">Borrowed</option>
                  <option value="lent">Lent</option>
                </select>
              </div>

              <div class="form-group">
                <label for="due_date">Due Date</label>
                <input
                  type="date"
                  id="due_date"
                  class="form-input"
                >
              </div>

              <div class="form-group form-full">
                <label for="note">Note</label>
                <input
                  type="text"
                  id="note"
                  class="form-input"
                  placeholder="Optional note"
                >
              </div>

            </div>

            <button type="submit" class="register-btn">
              Add Borrow/Lend
            </button>

            <div id="borrowMessage" class="message"></div>

          </form>
        </div>
      </div>

      <div class="dashboard-panel">
        <div class="panel-header">
          <h2>Borrow / Lend Records</h2>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Person</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Note</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="borrowTable">
              <tr>
                <td colspan="8">Loading borrow/lend records...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
