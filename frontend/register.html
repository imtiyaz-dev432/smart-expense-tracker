<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register | Smart Expense Tracker</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page" data-page="register">

  <!-- Background decorative shapes -->
  <div class="background-shapes">
    <span class="shape shape-one"></span>
    <span class="shape shape-two"></span>
    <span class="shape shape-three"></span>
  </div>

  <main class="register-page">

    <section class="register-card">

      <div class="register-header">
        <div class="logo-box">₹</div>

        <h1>Create Account</h1>

        <p>
          Register to start tracking your income, expenses,
          loans and subscriptions.
        </p>
      </div>

      <form id="registerForm" class="register-form">

        <div class="form-group">
          <label for="username">Username</label>

          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter your username"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="form-group">
          <label for="mobile_no">Mobile Number</label>

          <input
            type="text"
            id="mobile_no"
            class="form-input"
            placeholder="Enter your mobile number"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Create a strong password"
            required
          >
        </div>

        <button type="submit" class="register-btn">
          Register
        </button>

        <div id="registerMessage" class="message"></div>

      </form>

      <div class="register-footer">

        <p>
          Already have an account?
          <a href="login.html">Login here</a>
        </p>

        <p>
          Already registered?
          <a href="verify-otp.html">Verify OTP</a>
        </p>

      </div>

    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
